services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vostok-app
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - ./data:/app/data
    networks:
      - web
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: vostok-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
